version: '3.8'

services:
  api:
    environment:
      DATABASE_URL: postgresql://ingemark:ingemark@test-db:5432/ingemark_test
    depends_on:
      test-db:
        condition: service_healthy

  test-db:
    image: postgres:16
    environment:
      POSTGRES_USER: ingemark
      POSTGRES_PASSWORD: ingemark
      POSTGRES_DB: ingemark_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ingemark -d ingemark_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  tests:
    build: .
    environment:
      API_URL: http://api:8000
    depends_on:
      test-db:
        condition: service_healthy
      api:
        condition: service_started
    volumes:
      - .:/app
    command: ["uv", "run", "pytest", "tests/", "-v"]
