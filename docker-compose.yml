version: '3.8'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ingemark
      POSTGRES_PASSWORD: ingemark
      POSTGRES_DB: ingemark
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ingemark -d ingemark"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://ingemark:ingemark@db:5432/ingemark}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: ["uv", "run", "uvicorn", "src.api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]


volumes:
  postgres_data:
